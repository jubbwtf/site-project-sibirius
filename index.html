<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сибириус Квест AR</title>

    <!--
      FIX 1: CORRECT VERSION PAIR — this is the #1 cause of all your errors.
        - A-Frame 1.6.0  (from aframe.io — not blocked in Russia)
        - AR.js 3.4.7    (the ONLY version that works with A-Frame 1.6.0)
        - AR.js via jsdelivr.net/gh/ — GitHub-backed CDN, accessible in Russia
      
      FIX 2: aframe-ar.min.js (marker only, no NFT) — smaller, faster, no dead code
    -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* Camera feed — fills entire screen on iOS + Android */
        video, #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            object-fit: cover !important;
            z-index: 0 !important;
        }
        .a-canvas {
            width: 100vw !important;
            height: 100vh !important;
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            z-index: 1 !important;
            background: transparent !important;
        }

        /* Hide A-Frame chrome */
        .a-enter-vr, .a-loader-title, .a-orientation-modal { display: none !important; }

        /* ── Screens ───────────────────────────────────── */
        .fullscreen-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #121212;
            z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            padding: 28px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }

        h2 { color: #00FF88; font-size: 26px; font-weight: 700; margin-bottom: 12px; }
        h3 { color: #00FF88; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        p  { color: #E0E0E0; font-size: 15px; line-height: 1.6; margin: 6px 0; }

        .btn {
            width: 100%; padding: 16px;
            background: #00FF88; color: #121212;
            border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; margin-top: 18px;
            transition: opacity .15s;
        }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .btn:not(:disabled):active { opacity: .75; }

        /* ── In-game HUD ───────────────────────────────── */
        .game-overlay {
            position: fixed;
            bottom: 32px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(18,18,18,0.93);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 22px 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 12px 40px rgba(0,0,0,.7);
            text-align: center;
            z-index: 9998;
            display: none;
        }
        .progress-bar {
            font-size: 12px; color: #00FF88;
            letter-spacing: 1px; text-transform: uppercase;
            font-weight: 700; margin-bottom: 10px;
        }
        .hint { color: #00FF88; font-size: 13px; font-weight: 600; margin-top: 10px; }

        /* ── Toast — replaces alert() which kills camera thread ─ */
        .toast {
            position: fixed;
            top: 40px; left: 50%; transform: translateX(-50%);
            background: #00FF88; color: #121212;
            padding: 14px 26px; border-radius: 50px;
            font-size: 15px; font-weight: 700;
            z-index: 99999;
            box-shadow: 0 6px 24px rgba(0,255,136,.45);
            opacity: 0; transition: opacity .3s;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90vw; text-align: center;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<!-- Screen 1: GPS check -->
<div id="geo-screen" class="fullscreen-overlay">
    <div class="container">
        <h2>Сибириус Квест</h2>
        <p id="status-text">Синхронизация с GPS…</p>
        <button id="start-btn" class="btn" disabled>Начать квест</button>
    </div>
</div>

<!-- Screen 2: In-game HUD -->
<div id="game-screen" class="game-overlay">
    <div class="progress-bar">Задание: <span id="score">1</span> из 4</div>
    <h3 id="quest-title">Загрузка…</h3>
    <p id="quest-text">Загрузка…</p>
    <p class="hint">📸 Наведи камеру на маркер</p>
</div>

<!-- Screen 3: Finish -->
<div id="final-screen" class="fullscreen-overlay" style="display:none;">
    <div class="container">
        <h2>Квест пройден! 🎉</h2>
        <p>Ты успешно отыскал все скрытые AR-метки в Сибириусе!</p>
    </div>
</div>

<!-- Non-blocking toast notification -->
<div id="toast" class="toast"></div>

<!--
  FIX 3: vr-mode-ui disabled → no WebVR polyfill load (faster startup, no black half-screen)
  FIX 4: No <a-text> anywhere → eliminates the Roboto-msdf.json 404 crash that broke markers
          Using <a-plane> with color instead — zero external font dependency
-->
<a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    loading-screen="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
>
    <!-- STEP 1 — built-in HIRO preset, no files needed -->
    <a-marker preset="hiro" id="marker-step1">
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
            <a-image
                src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg"
                position="0 0.5 0" rotation="-90 0 0" scale="1.5 1.5 1.5">
            </a-image>
        </a-entity>
    </a-marker>

    <!-- STEP 2 — built-in KANJI preset; <a-plane> replaces <a-text> to avoid font crash -->
    <a-marker preset="kanji" id="marker-step2">
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
            <a-plane
                color="#00FF88"
                position="0 0.1 0" rotation="-90 0 0"
                width="2" height="0.6">
            </a-plane>
        </a-entity>
    </a-marker>

    <!-- STEPS 3 & 4 — custom .patt files; host them in the same folder as this HTML -->
    <a-marker type="pattern" url="pattern-step3.patt" id="marker-step3">
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
            <a-image src="step3.png" position="0 0.5 0" rotation="-90 0 0" scale="1.5 1.5 1.5"></a-image>
        </a-entity>
    </a-marker>

    <a-marker type="pattern" url="pattern-step4.patt" id="marker-step4">
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
            <a-image src="step4.png" position="0 0.5 0" rotation="-90 0 0" scale="2 2 2"></a-image>
        </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<script>
    // ── Config ──────────────────────────────────────────
    const DEBUG_MODE   = true;   // flip to false for real geo-check
    const SIBIRIUS_LAT = 61.001272;
    const SIBIRIUS_LON = 68.994418;
    const GEO_RADIUS_KM = 0.1;

    // ── State ───────────────────────────────────────────
    let currentStep = 1;
    let stepLocked  = false;

    const questSteps = [
        { title: "Шаг 1: Велопарковка",      text: "Найди маркер HIRO около велопарковки Сибириуса." },
        { title: "Шаг 2: Главный вход",       text: "Отлично! Иди к главному входу и найди маркер KANJI." },
        { title: "Шаг 3: Кофемашина в холле", text: "Зайди внутрь и найди кастомный маркер около кофемашины." },
        { title: "Шаг 4: Коворкинг",          text: "Поднимись на второй этаж. Найди финальный маркер в коворкинге." }
    ];

    const toastMessages = [
        'Велопарковка засчитана! 🔥 Шаг 2.',
        'Главный вход засчитан! 🚀 Идём внутрь.',
        'Кофемашина найдена! ⚡ Последний рывок.',
        'КВЕСТ ПРОЙДЕН! ТЫ КРАСАВЧИК! 🎉'
    ];

    // ── Toast (non-blocking, replaces alert) ────────────
    let toastTimer = null;
    function showToast(msg, ms = 2800) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), ms);
    }

    // ── Geo ─────────────────────────────────────────────
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    if (DEBUG_MODE) {
        document.getElementById('status-text').innerText = 'Локация подтверждена (Тест)';
        document.getElementById('start-btn').disabled = false;
    } else {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const d = getDistance(pos.coords.latitude, pos.coords.longitude, SIBIRIUS_LAT, SIBIRIUS_LON);
                if (d <= GEO_RADIUS_KM) {
                    document.getElementById('status-text').innerText = 'Ты в радиусе Сибириуса! ✅';
                    document.getElementById('start-btn').disabled = false;
                } else {
                    document.getElementById('status-text').innerText = `Слишком далеко. До Сибириуса: ${d.toFixed(2)} км`;
                }
            },
            () => { document.getElementById('status-text').innerText = 'Ошибка GPS. Разреши доступ в браузере.'; },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    }

    // ── Start ───────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('geo-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        updateQuestUI();
    });

    // ── Quest logic ─────────────────────────────────────
    function updateQuestUI() {
        const d = questSteps[currentStep - 1];
        document.getElementById('score').innerText      = currentStep;
        document.getElementById('quest-title').innerText = d.title;
        document.getElementById('quest-text').innerText  = d.text;
    }

    function nextStep() {
        stepLocked = true;
        showToast(toastMessages[currentStep - 1]);
        currentStep++;
        setTimeout(() => {
            stepLocked = false;
            if (currentStep <= 4) {
                updateQuestUI();
            } else {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('final-screen').style.display = 'flex';
            }
        }, 3000);
    }

    // ── Marker polling (object3D.visible = true only when camera sees it) ──
    setInterval(() => {
        if (document.getElementById('game-screen').style.display !== 'block') return;
        if (stepLocked) return;
        const markerIds = ['marker-step1','marker-step2','marker-step3','marker-step4'];
        const m = document.getElementById(markerIds[currentStep - 1]);
        if (m && m.object3D && m.object3D.visible) nextStep();
    }, 500);
</script>
</body>
</html>
